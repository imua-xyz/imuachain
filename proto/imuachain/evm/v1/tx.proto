syntax = "proto3";

package imuachain.evm.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "ethermint/evm/v1/tx.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/imua-xyz/imuachain/x/evm/types";

// Msg defines the x/evm Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  // CallContract defines a message that can be called by the module's
  // authority to call a contract. While it is technically feasible
  // for any Cosmos address to call an x/evm contract, we intentionally
  // restrict this functionality to the module's authority. It is used
  // by the authority to manage the ImuachainGateway contract.
  rpc CallContract(MsgCallContract) returns (ethermint.evm.v1.MsgEthereumTxResponse);
}

// MsgCallContract defines the request structure for executing a CallContract
// message.
message MsgCallContract {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "evm/MsgCallContract";

  // authority is the calling + controlling address
  string authority = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  // to is the hex address of the contract to call, or nil for contract creation
  string to = 2;
  // data is the hex encoded data to send to the contract
  bytes data = 3;
  // gas_limit is the gas limit for the transaction
  uint64 gas_limit = 4 [(gogoproto.customname) = "GasLimit"];
  // value is the value to send to the contract
  string value = 5 [
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.customname) = "Amount"
  ];
}
